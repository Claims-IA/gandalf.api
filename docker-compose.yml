version: '3.8'
services:
  nginx:
    image: nginx:latest
    container_name: gandalf_nginx
    volumes:
      - ./:/app
      - ./config/nginx/docker.conf:/etc/nginx/conf.d/gandalf.api.conf
      - /dev/null:/etc/nginx/conf.d/default.conf
    ports:
      - 8007:80
    depends_on:
      - php
  php:
    container_name: gandalf_api
    build:
      context: .
    volumes:
      - ./:/app
    depends_on:
      - db
  db:
    image: mongo:latest
    container_name: gandalf_mongodb
    ports:
      - 27018:27017
    volumes:
      # Named volume (not anonymous) so data survives `docker compose down`
      # and is reused on the next `up`. Only `down -v` deletes it.
      - gandalf_mongo_data:/data/db

volumes:
  gandalf_mongo_data:
